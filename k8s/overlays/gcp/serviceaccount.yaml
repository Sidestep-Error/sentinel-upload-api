# serviceaccount.yaml — GCP-overlay
#
# Dedikerad ServiceAccount för Sentinel Upload API i GCP-klustret.
#
# Varför behövs detta?
#   GCP-klustret har OPA Gatekeeper-policyn "no-default-sa" installerad,
#   som blockerar pods som kör med Kubernetes default ServiceAccount.
#   Utan en dedikerad SA nekar Gatekeeper deployment av vår app.
#
# Ansvarsuppdelning:
#   Den faktiska SA-resursen i klustret skapas av Terraform
#   (infra/terraform/sentinel/main.tf). Den här filen säkerställer
#   att Kustomize-overlayern inkluderar SA:n vid kubectl apply,
#   vilket gör deploymenten idempotent.
#
#   deployment-patch.yaml kopplar sedan SA:n till vår Deployment via
#   serviceAccountName: sentinel-api-sa
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sentinel-api-sa
  namespace: sidestep-error
  labels:
    app.kubernetes.io/name: sentinel-upload-api
    app.kubernetes.io/part-of: sentinel-platform
